<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <main class="container">
        <section class="card-login">

            <header>
                <h1>Tela de Login</h1>
                <p>Preencha os dados para entrar na sua conta</p>
            </header>

            <form id="formLogin">

                <div class="input-group">
                    <label for="nomeLogin">Nome</label>
                    <input type="nomeLogin" id="nomeLogin" required placeholder="Ex Luis Gustavo">
                </div>

                <div class="input-group">
                    <label for="cpfLogin">CPF</label>
                    <input type="cpfLogin" id="cpfLogin" required placeholder="Ex: 012345678-00">
                </div>

                <button type="submitLogin" id="btnEnviarLogin">Entrar na Conta</button>

            </form>

        </section>
    </main>
</body>
</html>
