<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    
    <main class="container">
        <section class="card-cadastro">

            <header>
                <h1>Tela de Cadastro</h1>
                <p>Preencha os dados abaixo para criar sua primeira conta</p>
            </header>

            <form id="formCadastro">

                <div class="input-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required placeholder="Ex: Luis Gustavo">
                </div>

                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="cpf" id="cpf" required placeholder="Ex: 012345678-00">
                </div>

                <div class="input-group">
                    <label for="dateOfBirth">Data de Nascimento</label>
                    <input type="date" id="dataOfBirth" required placeholder="Ex: 05/12/1999">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="Ex: gustavo03@Gmail">
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="senha" id="senha" required placeholder="Ex: 102#senHa123">
                </div>

                <div class="input-group">
                    <label for="tipoConta">Tipo de Conta</label>
                    <select id="tipoConta">
                        <option value="" disabled selected>Selecione uma opção</option>
                        <option value="CORRENTE">Conta Corrente</option>
                        <option value="POUPANCA">Conta Poupança</option>
                    </select>
                </div>

                <button type="submit" id="btnEnviar">Cadastrar Usuário</button>

            </form>

        </section>
    </main>

    <script src="js/main.Js"></script>
</body>
</html>
